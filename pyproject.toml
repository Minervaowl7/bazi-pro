[project]
name = "bazi-pro"
version = "4.3.0"
description = "专业八字命理分析引擎 — BM25+jieba 古籍检索 · 四层喜用神裁决 · 六层格局筛查 · 可视化报告"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Minervaowl7" }
]
keywords = ["bazi", "chinese-metaphysics", "fortune-telling", "classical-chinese", "nlp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Text Processing :: Linguistic",
]

dependencies = [
    "jieba>=0.42.1",
]

[project.optional-dependencies]
hybrid = ["sentence-transformers>=2.2", "faiss-cpu>=1.7", "numpy>=1.24"]
report = ["markdown>=3.5"]
pdf = ["weasyprint>=60"]

[project.scripts]
bazi-retrieve = "bazi_pro.retrieve_classical:main"
bazi-report = "bazi_pro.generate_report:main"
bazi-doctor = "bazi_pro.doctor:main"
bazi-evidence = "bazi_pro.evidence:main"
bazi-trace = "bazi_pro.trace:main" 

[tool.setuptools]
packages = ["bazi_pro"]
include-package-data = true

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"
