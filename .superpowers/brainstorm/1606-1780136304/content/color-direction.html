<h2>配色方向</h2>
<p class="subtitle">选择一个整体配色基调，后续所有页面都会基于此展开</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #0c0c14;">
      <div style="display: flex; gap: 8px; margin-bottom: 16px;">
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #0c0c14; border: 1px solid rgba(255,255,255,0.08);"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #14141f;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #1c1c2e;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #c9a96e;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #e8dcc8;"></div>
      </div>
      <div style="color: #e8dcc8; font-size: 13px; line-height: 1.6;">
        <span style="color: #c9a96e; font-weight: 600;">丁火日主</span> · 七杀佩印格 · 偏旺<br>
        深邃暗色背景 + 金色点缀，克制神秘
      </div>
    </div>
    <div class="card-body">
      <h3>A · 暗夜金砂</h3>
      <p>深色背景 + 暖金强调色。当前方案的优化版，保留神秘感但更精致</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #f7f3ed;">
      <div style="display: flex; gap: 8px; margin-bottom: 16px;">
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #f7f3ed; border: 1px solid #e0d8cc;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #fffaf2;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #ede5d8;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #8a3b2a;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #241a14;"></div>
      </div>
      <div style="color: #241a14; font-size: 13px; line-height: 1.6;">
        <span style="color: #8a3b2a; font-weight: 600;">丁火日主</span> · 七杀佩印格 · 偏旺<br>
        温暖宣纸底色 + 朱砂强调，文雅书卷气
      </div>
    </div>
    <div class="card-body">
      <h3>B · 宣纸朱砂</h3>
      <p>暖白/米色背景 + 朱砂红强调。东方书卷感，像古籍翻开的质感</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #fafafa;">
      <div style="display: flex; gap: 8px; margin-bottom: 16px;">
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #fafafa; border: 1px solid #e5e5e5;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #ffffff; border: 1px solid #e5e5e5;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #f0f0f0;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #1a1a1a;"></div>
        <div style="width: 48px; height: 48px; border-radius: 12px; background: #b8860b;"></div>
      </div>
      <div style="color: #1a1a1a; font-size: 13px; line-height: 1.6;">
        <span style="color: #b8860b; font-weight: 600;">丁火日主</span> · 七杀佩印格 · 偏旺<br>
        纯净中性底 + 极少东方点缀，像 Linear/Notion
      </div>
    </div>
    <div class="card-body">
      <h3>C · 素白点金</h3>
      <p>中性白/灰背景 + 金色极简点缀。最"现代极简"，东方元素最少但最克制</p>
    </div>
  </div>
</div>
