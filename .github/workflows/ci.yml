name: bazi-pro CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test tools
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[all]" pytest pytest-cov build ruff mypy

      - name: Ruff lint
        run: ruff check server/ bazi_pro/ tests/

      - name: Type check (mypy)
        run: mypy bazi_pro/ server/ --ignore-missing-imports --no-error-summary 2>&1 || true

      - name: Compile check
        run: python -m compileall bazi_pro server scripts tests -q

      - name: Version consistency
        run: python scripts/check_version_consistency.py

      - name: Output schema validation
        run: python tests/validate_output_schema.py

      - name: "Parallel audit (A: data tables)"
        run: python scripts/audit_data_tables.py

      - name: "Parallel audit (B: logic chain)"
        run: python scripts/audit_logic_chain.py

      - name: "Parallel audit (C: SKILL contract)"
        run: python scripts/audit_skill_consistency.py

      - name: "Parallel audit (D: golden cases)"
        run: python scripts/audit_golden_cases.py

      - name: Pytest (full suite with coverage)
        run: python -m pytest -q --cov=bazi_pro --cov=server --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-fail-under=50

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

      - name: Doctor
        run: python scripts/doctor.py

      - name: Corpus stats
        run: python scripts/retrieve_classical.py --stats

      - name: Basic retrieve
        run: python scripts/retrieve_classical.py "食神 制杀 身弱" -k 3 --json

      - name: Evidence
        run: python scripts/evidence.py | python -c "import sys,json; d=json.load(sys.stdin); assert len(d['evidence_chain'])>=3"

      - name: Golden cases
        run: python tests/run_golden.py

      - name: Doctor consistency
        run: python -m bazi_pro.doctor

      - name: Package import
        run: python -c "from bazi_pro.retrieve_classical import main, retrieve, retrieve_batch; from bazi_pro.dashboard import generate_dashboard; from bazi_pro.evidence import build_analysis_evidence; print('✅ All imports OK')"

      - name: Console scripts
        run: |
          bazi-retrieve --stats
          bazi-retrieve "食神 制杀 身弱" -k 2 --json | python -c "import sys,json; d=json.load(sys.stdin); assert d['corpus_size']>0; print('✅ bazi-retrieve')"
          bazi-retrieve --batch "食神" "七杀" -k 2 --json | python -c "import sys,json; d=json.load(sys.stdin); assert 'queries' in d and len(d['queries'])==2; print('✅ bazi-retrieve --batch')"
          bazi-doctor
          bazi-evidence | python -c "import sys,json; d=json.load(sys.stdin); assert len(d['evidence_chain'])>=3; print('✅ bazi-evidence')"

      - name: Server entry point
        run: |
          pip install -e ".[server]"
          python -c "from server.app import main, app; assert callable(main); print('✅ bazi-server entry')"
          python -c "from server.schemas import BaziAnalysisRequest; print('✅ server schema')"
          python -c "from server.taskstore import TaskStore, MemoryTaskStore, RedisTaskStore, create_task_store; print('✅ taskstore')"
          python -c "from server.ratelimiter import RateLimiter, MemoryRateLimiter, RedisRateLimiter, create_rate_limiter; print('✅ ratelimiter')"
          python -c "from server.analysis import run_analysis, _validate_input, _make_cache_key; print('✅ analysis')"
          python -c "from bazi_pro.validation import validate_bazi_input, validate_bazi_string, validate_day_master, validate_gender; print('✅ validation')"

      - name: Wheel build + twine check
        run: |
          pip install twine
          python -m build
          twine check dist/*
          python -m venv /tmp/bazi-wheel-test
          source /tmp/bazi-wheel-test/bin/activate
          pip install dist/*.whl
          bazi-retrieve --stats
          bazi-doctor
          set -o pipefail
          bazi-retrieve "食神 制杀" -k 1 --json | python3 -c 'import sys,json; d=json.load(sys.stdin); assert d["corpus_size"]>=2900; print("OK corpus="+str(d["corpus_size"]))'
          echo "✅ Wheel install OK"
