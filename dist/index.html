<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bazi-pro v4.3 — Replay Viewer</title>
<style>
:root{--bg:#0f0f14;--card:#1a1a24;--text:#e8e0d0;--dim:#8888a0;--accent:#d4af37;--glow:#f0d060;--good:#66bb6a;--warn:#ffa726;--bad:#ef5350;--border:#2e2e44;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Serif SC","Microsoft YaHei",serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
.hero{text-align:center;padding:50px 0 30px}
.hero h1{font-size:38px;font-weight:800;letter-spacing:4px;color:var(--glow)}
.hero p{font-size:16px;color:var(--dim);margin-top:8px}
.hero .mode-badge{display:inline-block;margin-top:12px;padding:5px 16px;border-radius:16px;background:var(--card);border:1px solid var(--accent);color:var(--accent);font-size:13px;font-weight:600}

/* ── Mode switcher ── */
.modes{display:flex;justify-content:center;gap:10px;margin:20px 0 30px;flex-wrap:wrap}
.mode-btn{padding:10px 24px;border:1.5px solid var(--border);border-radius:24px;background:var(--card);color:var(--text);cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.mode-btn:hover,.mode-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* ── Replay Timeline ── */
.timeline{position:relative;padding-left:32px;margin:24px 0}
.timeline::before{content:'';position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:var(--border)}
.stage{margin-bottom:20px;position:relative}
.stage::before{content:'';position:absolute;left:-24px;top:10px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);z-index:1}
.stage-done::before{background:var(--good)}
.stage-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.stage-header .idx{font-size:12px;color:var(--dim);font-weight:600;min-width:20px}
.stage-header .title{font-size:16px;font-weight:700;color:var(--accent)}
.stage-header .conf{font-size:12px;padding:2px 8px;border-radius:8px;font-weight:600}
.conf-high{background:#0d3a1a;color:var(--good)}
.conf-mid{background:#3a2a08;color:var(--warn)}
.stage p{font-size:14px;color:var(--dim);margin:4px 0 8px 30px}
.stage-details{margin-left:30px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:none;font-size:13px;line-height:1.8}
.stage-details.open{display:block}
.stage-details .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.stage-details .row:last-child{border-bottom:none}
.row .lbl{color:var(--dim)}
.row .val{font-weight:500;text-align:right;max-width:65%}
.evi-ref{display:inline-block;background:var(--card);border:1px solid var(--border);padding:1px 8px;border-radius:6px;font-size:12px;margin:2px 4px 2px 0;font-family:monospace;color:var(--accent)}
.evi-counter{color:var(--warn);margin-top:8px;padding:6px 12px;background:rgba(255,167,38,0.1);border-left:3px solid var(--warn);border-radius:0 var(--radius) var(--radius) 0)}

/* ── Evidence Chain ── */
.evidence-list{margin:24px 0}
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.ev-card summary{padding:12px 18px;cursor:pointer;font-weight:600;color:var(--accent);list-style:none;display:flex;justify-content:space-between}
.ev-card summary::-webkit-details-marker{display:none}
.ev-card .ev-body{padding:0 18px 14px;font-size:13px;line-height:1.8}

/* ── Dashboard link ── */
.artifact-links{text-align:center;margin:20px 0}
.artifact-links a{display:inline-block;margin:6px 10px;padding:10px 20px;background:var(--card);border:1.5px solid var(--accent);border-radius:20px;color:var(--accent);text-decoration:none;font-weight:600;font-size:14px;transition:all .2s}
.artifact-links a:hover{background:var(--accent);color:var(--bg)}

/* ── Upload ── */
.upload-area{text-align:center;margin:16px 0}
.upload-area input{display:none}
.upload-area label{padding:8px 20px;border:1.5px dashed var(--border);border-radius:20px;color:var(--dim);cursor:pointer;font-size:13px;display:inline-block}
.footer{text-align:center;padding:30px;color:var(--dim);font-size:12px;border-top:1px solid var(--border);margin-top:30px}
.footer a{color:var(--accent)}

@media(max-width:600px){.hero h1{font-size:28px}.modes{flex-direction:column;align-items:center}}
</style>
</head>
<body>

<div class="container">

<div class="hero">
    <h1>bazi-pro v4.3</h1>
    <p>可回放、可审计、可质询的八字命理分析引擎</p>
    <span class="mode-badge" id="modeBadge">Replay Viewer</span>
</div>

<div class="modes">
    <button class="mode-btn active" onclick="switchMode('replay')">🔁 推理回放</button>
    <button class="mode-btn" onclick="switchMode('evidence')">🔍 证据链审查</button>
    <button class="mode-btn" onclick="switchMode('dashboard')">📊 Dashboard</button>
</div>

<div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept=".json" onchange="loadTrace(event)">
    <label for="fileInput">📂 加载 analysis_trace.json</label>
</div>

<!-- REPLAY MODE -->
<div id="replayView">
    <div class="timeline" id="timeline"></div>
    <div class="artifact-links" id="artifacts"></div>
</div>

<!-- EVIDENCE MODE -->
<div id="evidenceView" style="display:none">
    <div class="evidence-list" id="evidenceList"></div>
</div>

<!-- DASHBOARD MODE -->
<div id="dashboardView" style="display:none;text-align:center;padding:20px">
    <p style="color:var(--dim)">打开交互式仪表盘查看完整命盘分析</p>
    <div class="artifact-links" id="dashLinks"></div>
</div>

<div class="footer">
    <p>bazi-pro v4.3 · <a href="https://github.com/Minervaowl7/bazi-pro">GitHub</a> · MIT</p>
    <p style="margin-top:4px">仅供传统文化学习与参考</p>
</div>

</div>

<script>
let currentTrace = null;

// Load sample trace on page load
fetch('./sample_trace.json')
    .then(r => r.json())
    .then(t => { currentTrace = t; renderAll(); })
    .catch(() => console.log('No sample_trace.json found, use upload'));

function switchMode(mode) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('modeBadge').textContent =
        mode === 'replay' ? 'Replay Viewer' : mode === 'evidence' ? 'Evidence Chain' : 'Dashboard';
    document.getElementById('replayView').style.display = mode === 'replay' ? '' : 'none';
    document.getElementById('evidenceView').style.display = mode === 'evidence' ? '' : 'none';
    document.getElementById('dashboardView').style.display = mode === 'dashboard' ? '' : 'none';
    if (currentTrace) renderAll();
}

function loadTrace(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        currentTrace = JSON.parse(e.target.result);
        renderAll();
    };
    reader.readAsText(file);
}

function renderAll() {
    if (!currentTrace) return;
    renderTimeline(currentTrace);
    renderEvidence(currentTrace);
    renderArtifacts(currentTrace);
}

function renderTimeline(trace) {
    const tl = document.getElementById('timeline');
    const stages = trace.stages || [];
    tl.innerHTML = stages.map((s, i) => {
        const conf = s.confidence;
        const confHtml = conf ? `<span class="conf ${conf >= 0.8 ? 'conf-high' : 'conf-mid'}">${Math.round(conf*100)}%</span>` : '';
        const evidenceIds = (s.evidence_ids || []).map(id => {
            const ev = (trace.evidence || []).find(e => e.id === id);
            return ev ? `<span class="evi-ref" title="${ev.claim}">${id}</span>` : '';
        }).join('');

        let details = '';
        if (s.outputs) {
            details += '<div class="row"><span class="lbl">输出</span><span class="val">' +
                Object.entries(s.outputs).map(([k,v]) => `<span class="evi-ref">${k}=${v}</span>`).join(' ') +
                '</span></div>';
        }
        if (evidenceIds) details += `<div class="row"><span class="lbl">证据</span><span class="val">${evidenceIds}</span></div>`;
        if (s.results && s.results.length) {
            details += `<div class="row"><span class="lbl">检索命中</span><span class="val">${s.results.length} 条</span></div>`;
            s.results.slice(0,3).forEach(r => {
                details += `<div class="row"><span class="lbl" style="font-size:11px">${r.source}</span><span class="val" style="font-size:11px">${r.matched_terms ? r.matched_terms.join(', ') : ''} (${(r.score||0).toFixed(1)})</span></div>`;
            });
        }
        if (s.claims) details += `<div class="row"><span class="lbl">主张</span><span class="val">${s.claims.join('; ')}</span></div>`;
        if (s.decision) details += `<div class="row"><span class="lbl">裁决</span><span class="val" style="color:var(--accent);font-weight:700">${s.decision}</span></div>`;

        return `<div class="stage stage-done" onclick="this.querySelector('.stage-details').classList.toggle('open')">
            <div class="stage-header">
                <span class="idx">${i+1}</span>
                <span class="title">${s.title}</span>
                ${confHtml}
            </div>
            <p>${s.summary}</p>
            <div class="stage-details">${details}</div>
        </div>`;
    }).join('');
}

function renderEvidence(trace) {
    const list = document.getElementById('evidenceList');
    const evs = trace.evidence || [];
    list.innerHTML = evs.map(ev => {
        const conf = ev.confidence;
        const confHtml = conf ? `<span class="conf ${conf >= 0.8 ? 'conf-high' : 'conf-mid'}">${Math.round(conf*100)}%</span>` : '';
        let body = '';
        if (ev.basis) {
            body += `<div class="row"><span class="lbl">MCP字段</span><span class="val">${(ev.basis.mcp_fields||[]).join(', ')}</span></div>`;
            body += `<div class="row"><span class="lbl">规则</span><span class="val">${(ev.basis.rules||[]).join('; ')}</span></div>`;
            if (ev.basis.classics && ev.basis.classics.length) {
                body += `<div class="row"><span class="lbl">古籍</span><span class="val">${ev.basis.classics.map(c => `<span class="evi-ref">${c}</span>`).join(' ')}</span></div>`;
            }
        }
        if (ev.counter_evidence && ev.counter_evidence.length) {
            body += `<div class="evi-counter">⚠️ ${ev.counter_evidence.join('; ')}</div>`;
        }
        if (ev.final_decision) body += `<div class="row"><span class="lbl">裁决</span><span class="val" style="color:var(--accent);font-weight:700">${ev.final_decision}</span></div>`;
        return `<details class="ev-card">
            <summary>🔍 ${ev.claim} ${confHtml}</summary>
            <div class="ev-body">${body}</div>
        </details>`;
    }).join('');
}

function renderArtifacts(trace) {
    const art = trace.artifacts || {};
    const links = [];
    if (art.report_html) links.push(`<a href="${art.report_html}" target="_blank">📊 仪表盘报告</a>`);
    if (art.report_md) links.push(`<a href="${art.report_md}" target="_blank">📝 Markdown 报告</a>`);
    document.getElementById('artifacts').innerHTML = links.join('');
    document.getElementById('dashLinks').innerHTML = links.join('');
}
</script>

</body>
</html>
